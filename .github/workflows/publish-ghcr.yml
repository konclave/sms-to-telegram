name: Publish GHCR Alpine Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release tags
        run: |
          VERSION_TAG="${GITHUB_REF_NAME}"
          NORMALIZED_TAG="${VERSION_TAG#v}"
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/sms-to-telegram"
          VERSION_PATTERN='^v[0-9]+\.[0-9]+\.[0-9]+$'

          if [ "${NORMALIZED_TAG}" = "${VERSION_TAG}" ]; then
            echo "Expected a version tag prefixed with v, got ${VERSION_TAG}" >&2
            exit 1
          fi

          if ! printf '%s\n' "${VERSION_TAG}" | grep -Eq "${VERSION_PATTERN}"; then
            echo "Expected a semantic version tag like v1.2.3, got ${VERSION_TAG}" >&2
            exit 1
          fi

          echo "VERSION_TAG=${VERSION_TAG}" >> "${GITHUB_ENV}"
          echo "NORMALIZED_TAG=${NORMALIZED_TAG}" >> "${GITHUB_ENV}"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Alpine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.alpine
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}
            ${{ env.IMAGE_NAME }}:${{ env.NORMALIZED_TAG }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.VERSION_TAG }}
